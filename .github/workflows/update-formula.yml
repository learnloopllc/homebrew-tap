name: Update Formula

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name (glow, glow-beta, learnloop, learnloop-beta)"
        required: true
      version:
        description: "Version number (e.g. 2.9.0)"
        required: true
      tag:
        description: "Release tag (e.g. v2.9.0 or v2.9.0-beta)"
        required: true
      repo:
        description: "Source repo (e.g. learnloopllc/glow-cli)"
        required: true
      bin_name:
        description: "Primary binary name (e.g. glow, learnloop)"
        required: true
      bin_alias:
        description: "Binary alias (e.g. glw, ll)"
        required: true
      sha_arm:
        description: "SHA256 for aarch64-apple-darwin"
        required: true
      sha_x86_mac:
        description: "SHA256 for x86_64-apple-darwin"
        required: true
      sha_linux:
        description: "SHA256 for x86_64-unknown-linux-gnu"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          FORMULA="${{ inputs.formula }}"
          VERSION="${{ inputs.version }}"
          TAG="${{ inputs.tag }}"
          REPO="${{ inputs.repo }}"
          BIN_NAME="${{ inputs.bin_name }}"
          BIN_ALIAS="${{ inputs.bin_alias }}"
          SHA_ARM="${{ inputs.sha_arm }}"
          SHA_X86_MAC="${{ inputs.sha_x86_mac }}"
          SHA_LINUX="${{ inputs.sha_linux }}"

          # Derive class name from formula name (glow-beta → GlowBeta)
          CLASS_NAME=$(echo "$FORMULA" | sed 's/-\(.\)/\U\1/g; s/^\(.\)/\U\1/')

          # Derive description
          case "$FORMULA" in
            glow)          DESC="CLI for the Glow platform — manage instances, deployments, and resources" ;;
            glow-beta)     DESC="CLI for the Glow platform (beta) — manage instances, deployments, and resources" ;;
            learnloop)     DESC="CLI for the LearnLoop platform — manage orgs, billing, deployments, and licenses" ;;
            learnloop-beta) DESC="CLI for the LearnLoop platform (beta) — manage orgs, billing, deployments, and licenses" ;;
            *) DESC="CLI for the LearnLoop platform" ;;
          esac

          # Derive help match string
          case "$FORMULA" in
            glow*) HELP_MATCH="Glow CLI" ;;
            learnloop*) HELP_MATCH="LearnLoop platform CLI" ;;
            *) HELP_MATCH="CLI" ;;
          esac

          # Check if formula has completions (glow does, learnloop doesn't yet)
          COMPLETIONS=""
          case "$FORMULA" in
            glow*) COMPLETIONS="    generate_completions_from_executable(bin/\"${BIN_NAME}\", \"completions\")" ;;
          esac

          cat > "Formula/${FORMULA}.rb" << EOF
          class ${CLASS_NAME} < Formula
            desc "${DESC}"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/${BIN_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/${BIN_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
            end

            on_linux do
              url "https://github.com/${REPO}/releases/download/${TAG}/${BIN_NAME}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "${BIN_NAME}"
              bin.install "${BIN_ALIAS}"
          ${COMPLETIONS}
            end

            test do
              assert_match "${HELP_MATCH}", shell_output("#{bin}/${BIN_NAME} --help")
              assert_match version.to_s, shell_output("#{bin}/${BIN_NAME} --version")
              assert_match "${HELP_MATCH}", shell_output("#{bin}/${BIN_ALIAS} --help")
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "Formula/${FORMULA}.rb"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${{ inputs.formula }}.rb"
          if git diff --cached --quiet; then
            echo "Formula already up to date"
          else
            git commit -m "Update ${{ inputs.formula }} to ${{ inputs.tag }}"
            git push
          fi
